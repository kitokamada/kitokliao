<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Time — Kito Liao</title>

<style>
  body {
    font-family: Georgia, Times, serif;
    font-size: 15px;
    line-height: 1.6;
    color: #000;
    background: #fff;
    margin: 0;
    padding: 0;
  }

  #container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px 60px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .back {
    font-size: 14px;
    margin-bottom: 20px;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }

  .gallery img {
    width: 100%;
    border-radius: 6px;
    transition: transform 0.2s ease;
  }

  .gallery img:hover {
    transform: scale(1.03);
  }

  .caption {
    font-size: 12px;
    color: #555;
    margin-top: 4px;
  }

  .flyers {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-top: 12px;
}

.flyers img {
  width: 100%;
  height: auto;
  border-radius: 6px;
}
</style>
</head>

<body>
<div id="container">

  <h1>Free Time</h1>
  <p class="back"><a href="index.html">← Back to Home</a></p>
  <p>
    Outside of astrophysics, I am involved in many creative projects in the Hip-Hop communitity...
  </p>
  <h2>Some recent invited Events</h2>
  <p class="section-note">
    Selected recent flyers from invited DJ appearances in Paris, Seoul, Tokyo...
  </p>

  <div class="flyers">
    <img src="photos/Paris-1.jpg" alt="Paris event flyer">
    <img src="photos/Paris-2.jpg" alt="Paris Fete de La Musique flyer">
    <img src="photos/Seoul.JPG" alt="Seoul event flyer">
    <img src="photos/Tokyo.jpg" alt="Tokyo event flyer">
  </div>

</div>
</body>
</html>
