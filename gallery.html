<style>
  body {
    font-family: Georgia, Times, serif;
    font-size: 15px;
    line-height: 1.6;
    color: #000;
    background: #fff;
    margin: 0;
    padding: 0;
  }

  #container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px 60px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  .back {

  .gallery img:hover {

  </p>

  <p class="section-note">

  </p>

  <div class="flyers">
    <img src="photos/paris1.jpg" alt="Paris event flyer">
    <img src="photos/paris2.jpg" alt="Paris in-store DJ session flyer">
